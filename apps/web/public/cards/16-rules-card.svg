<svg xmlns="http://www.w3.org/2000/svg" width="69.5mm" height="94.9mm" viewBox="0 0 695 949" font-family="URW Gothic"><g transform="translate(30,30)"><rect x="-30" y="-30" width="695" height="979" fill="#47250F"/><rect x="14" y="14" width="607" height="861" rx="18" fill="none" stroke="#FFE3A8" stroke-width="2" opacity="0.6"/><text x="317" y="74" font-size="40" font-weight="bold" font-family="URW Bookman" fill="#FFE9C2" text-anchor="middle" letter-spacing="4">LAZY SUNDAY</text><text x="317" y="104" font-size="16" font-family="Carlito" fill="#F5A62B" text-anchor="middle" letter-spacing="5">TURN CHEAT SHEET</text><text x="52" y="148" font-size="21" font-weight="bold" font-family="Carlito" fill="#F5A62B" letter-spacing="1">ON YOUR TURN — PICK ONE</text><text x="52" y="178" font-size="18" font-family="Carlito" fill="#FFE9C2">1  Draw: swap it into your list face-down, OR discard it.</text><text x="52" y="205" font-size="18" font-family="Carlito" fill="#FFD9A0">    Discarding from the deck may trigger its action.</text><text x="52" y="232" font-size="18" font-family="Carlito" fill="#FFE9C2">2  Take the DONE pile’s top card into your list.</text><text x="52" y="259" font-size="18" font-family="Carlito" fill="#FFE9C2">3  Call “NOT ME!” — everyone else gets one last turn.</text><text x="52" y="298" font-size="21" font-weight="bold" font-family="Carlito" fill="#F5A62B" letter-spacing="1">“DONE IT!” — ANY TIME, FASTEST HAND</text><text x="52" y="328" font-size="18" font-family="Carlito" fill="#FFE9C2">Slam a card matching DONE’s top card:</text><text x="52" y="355" font-size="18" font-family="Carlito" fill="#FFD9A0">yours → it stays gone · theirs → give them one of yours</text><text x="52" y="382" font-size="18" font-family="Carlito" fill="#FFD9A0">wrong → it goes back and you draw a penalty card</text><text x="52" y="421" font-size="21" font-weight="bold" font-family="Carlito" fill="#F5A62B" letter-spacing="1">THE 8 ACTIONS (drawn &amp; discarded only)</text><text x="52" y="451" font-size="18" font-family="Carlito" fill="#FFE9C2">1    “I’m Busy” — a player skips their next turn</text><text x="52" y="477" font-size="18" font-family="Carlito" fill="#FFE9C2">7    Check the List — peek at one of yours</text><text x="52" y="503" font-size="18" font-family="Carlito" fill="#FFE9C2">8    Knock It Out — peek at one of yours; may discard it</text><text x="52" y="529" font-size="18" font-family="Carlito" fill="#FFE9C2">9    “Let’s Trade” — blind-swap one with an opponent</text><text x="52" y="555" font-size="18" font-family="Carlito" fill="#FFE9C2">10  Switcheroo — swap two cards between two others</text><text x="52" y="581" font-size="18" font-family="Carlito" fill="#FFE9C2">11  Snoop — peek at one opponent card</text><text x="52" y="607" font-size="18" font-family="Carlito" fill="#FFE9C2">12  “Not My Job” — move a card between two opponents</text><text x="52" y="633" font-size="18" font-family="Carlito" fill="#FFE9C2">13  Landlord’s Notice — top deck card onto an opponent</text><text x="52" y="671" font-size="21" font-weight="bold" font-family="Carlito" fill="#F5A62B" letter-spacing="1">SCORING</text><text x="52" y="701" font-size="18" font-family="Carlito" fill="#FFE9C2">Caller lowest (ties OK) → caller 0, others their totals.</text><text x="52" y="728" font-size="18" font-family="Carlito" fill="#FFE9C2">Anyone beats the caller → caller 50. Lowest total wins.</text><text x="317" y="866" font-size="16" font-family="Carlito" fill="#C9955C" text-anchor="middle" letter-spacing="2">playlazysunday.com · lowest effort wins</text></g></svg>
